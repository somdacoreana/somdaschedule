  <!-- =====================================================
    🔥 FIREBASE 설정 (1단계)
    아래 3개의 script 태그는 Firebase를 불러오는 코드예요.
    이미 들어 있으니 건드리지 않아도 돼요.
  ====================================================== -->
  <script type="module">
    // Firebase SDK 불러오기
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getStorage, ref, uploadString, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

    // =====================================================
    // 🔥 FIREBASE 설정 (2단계) ← 여기만 채우면 끝!
    //
    // Firebase 콘솔(console.firebase.google.com)에서
    // 새 프로젝트 만들고 → 웹 앱 추가 → 아래 값들을 복붙하세요.
    //
    // 지금은 더미값이 들어 있어서 앱이 "오프라인 모드"로 작동해요.
    // (일정이 브라우저에만 저장됨. 팬들한테는 안 보임)
    // Firebase 연결하면 모든 팬이 실시간으로 볼 수 있어요!
    // =====================================================
    const firebaseConfig = {
      apiKey:            "여기에-붙여넣기",          // apiKey
      authDomain:        "여기에-붙여넣기",          // authDomain
      projectId:         "여기에-붙여넣기",          // projectId
      storageBucket:     "여기에-붙여넣기",          // storageBucket
      messagingSenderId: "여기에-붙여넣기",          // messagingSenderId
      appId:             "여기에-붙여넣기"           // appId
    };

    // Firebase 연결 시도
    let db = null;
    let storage = null;
    let firebaseReady = false;

    try {
      if (firebaseConfig.apiKey !== "여기에-붙여넣기") {
        const app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        storage = getStorage(app);
        firebaseReady = true;
        console.log("✅ Firebase 연결 성공!");
      } else {
        console.log("⚠️ Firebase 미설정 — 로컬 모드로 실행됩니다.");
      }
    } catch(e) {
      console.log("⚠️ Firebase 연결 실패 — 로컬 모드로 실행됩니다.", e);
    }

    // =====================================================
    // Firebase 데이터 읽기/쓰기 함수들
    // =====================================================
    async function fbLoadEvents() {
      if (!db) return null;
      try {
        const snap = await getDoc(doc(db, "somda", "events"));
        return snap.exists() ? snap.data().list : null;
      } catch(e) { return null; }
    }

    async function fbSaveEvents(events) {
      if (!db) return;
      try {
        await setDoc(doc(db, "somda", "events"), { list: events });
      } catch(e) { console.log("저장 실패:", e); }
    }

    async function fbLoadBanner() {
      if (!db) return null;
      try {
        const snap = await getDoc(doc(db, "somda", "banner"));
        return snap.exists() ? snap.data().url : null;
      } catch(e) { return null; }
    }

    async function fbSaveBanner(dataUrl) {
      if (!storage || !db) return;
      try {
        const storageRef = ref(storage, "somda/banner.jpg");
        await uploadString(storageRef, dataUrl, "data_url");
        const url = await getDownloadURL(storageRef);
        await setDoc(doc(db, "somda", "banner"), { url });
        return url;
      } catch(e) { console.log("배너 저장 실패:", e); return null; }
    }

    // 앱이 로드된 후 Firebase 함수들을 전역으로 노출
    window._fb = { fbLoadEvents, fbSaveEvents, fbLoadBanner, fbSaveBanner, firebaseReady };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

  <style>
    /* ====================================================
       전체 디자인 스타일
       색상 변경하려면 :root 안의 값을 바꾸세요
    ==================================================== */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --warm: #B5704A;
      --warm-light: #F0E6DC;
      --warm-pale: #FAF5F0;
      --warm-dark: #7A3F20;
      --warm-mid: #D4956F;
      --ink: #1A1410;
      --ink2: #4A3728;
      --ink3: #8A7060;
      --line: rgba(181,112,74,0.18);
      --line2: rgba(181,112,74,0.35);
      --bg: #FFFCF9;
    }
    html, body { height: 100%; font-family: 'Noto Sans KR', sans-serif; background: var(--bg); }
    .app { max-width: 480px; margin: 0 auto; background: var(--bg); min-height: 100vh; padding-bottom: 60px; }

    /* 배너 */
    .banner { position: relative; width: 100%; height: 240px; overflow: hidden; background: #2A1F18; }
    .banner-img { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
    .banner-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.08) 0%, rgba(0,0,0,0.55) 100%); }
    .banner-content { position: absolute; bottom: 0; left: 0; right: 0; padding: 16px 22px 20px; }
    .banner-logo { height: 38px; width: auto; display: block; margin-bottom: 5px; filter: brightness(0) invert(1); opacity: 0.93; }
    .banner-sub { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 3px; text-transform: uppercase; }
    .banner-lang { position: absolute; top: 13px; right: 14px; display: flex; gap: 5px; }
    .lang-btn { padding: 4px 9px; border-radius: 20px; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.4); background: rgba(0,0,0,0.25); color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.15s; }
    .lang-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.8); }
    .lang-btn:hover { background: rgba(255,255,255,0.18); color: #fff; }
    .admin-btn { position: absolute; top: 13px; left: 14px; width: 30px; height: 30px; border-radius: 50%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.3); cursor: pointer; display: flex; align-items: center; justify-content: center; color: rgba(255,255,255,0.8); font-size: 14px; transition: all 0.15s; }
    .admin-btn:hover { background: rgba(0,0,0,0.5); }

    /* 달력 */
    .cal-section { padding: 22px 22px 0; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .cal-month-label { font-size: 17px; font-weight: 600; color: var(--ink); letter-spacing: -0.3px; font-family: 'Noto Serif KR', serif; }
    .nav-btn { width: 30px; height: 30px; border: 0.5px solid var(--line2); border-radius: 50%; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink3); font-size: 13px; transition: all 0.15s; }
    .nav-btn:hover { background: var(--warm-light); color: var(--warm); }
    .cal-days-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
    .cal-dlabel { text-align: center; font-size: 10px; font-weight: 500; color: var(--ink3); letter-spacing: 0.5px; padding: 4px 0; }
    .cal-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; position: relative; transition: all 0.12s; font-size: 13px; font-weight: 400; color: var(--ink); }
    .cal-day:hover:not(.other-month) { background: var(--warm-light); }
    .cal-day.other-month { color: var(--ink3); opacity: 0.3; cursor: default; }
    .cal-day.today { background: var(--ink); color: #fff; font-weight: 600; }
    .cal-day.today:hover { background: var(--ink); }
    .cal-day.has-event .dot { position: absolute; bottom: 3px; width: 4px; height: 4px; border-radius: 50%; background: var(--warm); }
    .cal-day.today .dot { background: #fff; }
    .cal-day.selected:not(.today) { border: 1.5px solid var(--warm); color: var(--warm-dark); font-weight: 600; }
    .divider { height: 1px; background: var(--line); margin: 18px 0 0; }

    /* 스케쥴 */
    .sched-section { padding: 18px 22px; }
    .section-label { font-size: 10px; font-weight: 600; color: var(--ink3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; }
    .sched-date-head { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 14px; font-family: 'Noto Serif KR', serif; }
    .no-event { font-size: 13px; color: var(--ink3); padding: 8px 0 4px; }
    .event-card { border: 0.5px solid var(--line2); border-left: 3px solid var(--warm); border-radius: 0 10px 10px 0; padding: 14px 16px; margin-bottom: 10px; background: var(--bg); }
    .event-type { font-size: 10px; font-weight: 600; letter-spacing: 1.5px; color: var(--warm); text-transform: uppercase; margin-bottom: 5px; }
    .event-title { font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 10px; letter-spacing: -0.2px; }
    .event-meta { display: flex; flex-direction: column; gap: 4px; }
    .event-meta-row { display: flex; align-items: flex-start; gap: 7px; font-size: 12px; color: var(--ink2); }
    .meta-icon { font-size: 13px; margin-top: 1px; color: var(--warm-mid); flex-shrink: 0; }

    /* 다가오는 공연 */
    .upcoming-section { padding: 0 22px 20px; }
    .upcoming-item { display: flex; align-items: center; gap: 14px; padding: 11px 0; border-bottom: 0.5px solid var(--line); cursor: pointer; transition: opacity 0.12s; }
    .upcoming-item:hover { opacity: 0.7; }
    .upcoming-date-badge { width: 38px; text-align: center; flex-shrink: 0; }
    .badge-day { font-size: 17px; font-weight: 700; color: var(--ink); line-height: 1; font-family: 'Noto Serif KR', serif; }
    .badge-mon { font-size: 9px; color: var(--warm); letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px; }
    .upcoming-info { flex: 1; }
    .upcoming-title { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; }
    .upcoming-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }

    /* 로딩 상태 표시 */
    .loading-badge { font-size: 11px; color: var(--warm); background: var(--warm-light); padding: 3px 10px; border-radius: 20px; display: inline-block; margin-bottom: 12px; }

    /* 모달 (관리자 창, 비번 창 등) */
    .modal-wrap { display: none; position: fixed; inset: 0; background: rgba(26,20,16,0.6); z-index: 100; align-items: center; justify-content: center; padding: 16px; }
    .modal-wrap.open { display: flex; }
    .modal-box { background: var(--bg); border-radius: 14px; padding: 26px 22px; width: 100%; max-width: 360px; max-height: 88vh; overflow-y: auto; }
    .modal-title { font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 14px; font-family: 'Noto Serif KR', serif; }
    .modal-label { font-size: 10px; color: var(--ink3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; margin-top: 11px; }
    .modal-input { width: 100%; padding: 9px 12px; border: 0.5px solid var(--line2); border-radius: 8px; background: var(--warm-pale); font-size: 13px; color: var(--ink); outline: none; font-family: 'Noto Sans KR', sans-serif; }
    .modal-input:focus { border-color: var(--warm); }
    .modal-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-cancel { flex: 1; padding: 10px; border: 0.5px solid var(--line2); border-radius: 8px; background: transparent; font-size: 13px; color: var(--ink3); cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }
    .btn-confirm { flex: 1; padding: 10px; border: none; border-radius: 8px; background: var(--ink); font-size: 13px; color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
    .btn-warm { width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 8px; background: var(--warm); font-size: 13px; color: #fff; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; font-weight: 500; }
    .err-msg { font-size: 12px; color: #c44; margin-top: 6px; min-height: 16px; }
    select.modal-input { appearance: none; -webkit-appearance: none; }

    /* 관리자 패널 */
    .admin-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .admin-title { font-size: 15px; font-weight: 700; color: var(--ink); font-family: 'Noto Serif KR', serif; }
    .admin-close-btn { background: none; border: none; font-size: 18px; cursor: pointer; color: var(--ink3); }
    .admin-badge { display: inline-block; font-size: 10px; padding: 2px 8px; background: var(--warm-light); color: var(--warm-dark); border-radius: 20px; letter-spacing: 1px; margin-bottom: 12px; font-weight: 600; }
    .admin-tabs { display: flex; gap: 6px; margin-bottom: 14px; }
    .admin-tab { flex: 1; padding: 8px 6px; border: 0.5px solid var(--line2); border-radius: 8px; background: transparent; font-size: 12px; color: var(--ink3); cursor: pointer; text-align: center; transition: all 0.12s; font-family: 'Noto Sans KR', sans-serif; }
    .admin-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }
    .event-admin-item { border: 0.5px solid var(--line); border-radius: 10px; padding: 11px 13px; margin-bottom: 7px; background: var(--warm-pale); display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
    .ev-d { font-size: 11px; color: var(--warm); font-weight: 600; margin-bottom: 2px; }
    .ev-t { font-size: 12px; color: var(--ink); font-weight: 500; line-height: 1.3; }
    .event-admin-actions { display: flex; gap: 4px; flex-shrink: 0; }
    .btn-edit-sm, .btn-del-sm { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; cursor: pointer; border: 0.5px solid var(--line); }
    .btn-edit-sm { background: var(--warm-light); color: var(--warm-dark); }
    .btn-del-sm { background: #fff5f5; color: #c44; border-color: rgba(200,68,68,0.2); }

    /* 배너 사진 업로드 */
    .photo-upload-area { border: 1.5px dashed var(--line2); border-radius: 12px; padding: 22px 16px; text-align: center; cursor: pointer; transition: all 0.15s; margin-bottom: 10px; background: var(--warm-pale); }
    .photo-upload-area:hover { border-color: var(--warm); background: var(--warm-light); }
    .photo-upload-area i { font-size: 28px; color: var(--warm-mid); display: block; margin-bottom: 8px; }
    .photo-upload-area p { font-size: 12px; color: var(--ink3); line-height: 1.6; }
    .photo-preview-img { width: 100%; height: 140px; object-fit: cover; object-position: center top; border-radius: 10px; display: block; margin-bottom: 10px; }
    .btn-remove { width: 100%; margin-bottom: 6px; padding: 8px; border: 0.5px solid rgba(200,68,68,0.3); border-radius: 8px; background: transparent; font-size: 12px; color: #c44; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; }

    /* Tabler 아이콘 */
    @import url("https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css");
  </style>
</head>

// =====================================================
// 로컬 스토리지 유틸
// =====================================================
function loadLocal(key, fallback) {
  try { const s = localStorage.getItem(key); return s ? JSON.parse(s) : JSON.parse(fallback); }
  catch(e) { return JSON.parse(fallback); }
}
function loadLocalStr(key, fallback) {
  try { return localStorage.getItem(key) || fallback; } catch(e) { return fallback; }
}
function saveLocal(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}
function saveLocalStr(key, val) {
  try { localStorage.setItem(key, val); } catch(e) {}
}

function pad(n) { return String(n).padStart(2, "0"); }
function t() { return I18N[lang]; }
function dk(y, m, d) { return `${y}-${pad(m)}-${pad(d)}`; }

// =====================================================
// Firebase와 동기화 (앱 시작 시 한 번)
// =====================================================
window.addEventListener("firebase-ready", async () => {
  if (!window._fb || !window._fb.firebaseReady) return;
  const { fbLoadEvents, fbLoadBanner } = window._fb;

  // 서버에서 일정 불러오기
  const serverEvents = await fbLoadEvents();
  if (serverEvents) {
    EVENTS = serverEvents;
    saveLocal(EVENTS_KEY, EVENTS);
    renderCal();
    renderUpcoming();
    if (selectedDate) renderSched(selectedDate);
  }

  // 서버에서 배너 URL 불러오기
  const bannerUrl = await fbLoadBanner();
  if (bannerUrl) {
    const img = document.getElementById("bannerImg");
    img.src = bannerUrl;
    img.style.opacity = "1";
  }
});

// =====================================================
// 저장 함수 (로컬 + Firebase 동시)
// =====================================================
async function saveEvents(ev) {
  saveLocal(EVENTS_KEY, ev);
  if (window._fb && window._fb.firebaseReady) {
    await window._fb.fbSaveEvents(ev);
  }
}

async function saveBannerData(dataUrl) {
  saveLocalStr(BANNER_KEY, dataUrl);
  if (window._fb && window._fb.firebaseReady) {
    const url = await window._fb.fbSaveBanner(dataUrl);
    return url || dataUrl;
  }
  return dataUrl;
}

function setLang(l) {
  lang = l;
  saveLocalStr(LANG_KEY, l);
  document.querySelectorAll(".lang-btn").forEach((b, i) => {
    b.classList.toggle("active", ["ko","en","pt"][i] === l);
  });
  document.getElementById("bannerSub").textContent = t().sub;
  renderCal();
  renderUpcoming();
  if (selectedDate) renderSched(selectedDate);
  else document.getElementById("schedSection").innerHTML = "";
}

// =====================================================
// 달력 렌더링
// =====================================================
function renderCal() {
  const T = t();
  const mLabel = document.getElementById("calMonthLabel");
  if (lang === "ko") mLabel.textContent = `${curYear}. ${pad(curMonth)}`;
  else if (lang === "en") mLabel.textContent = `${T.monthNames[curMonth-1]} ${curYear}`;
  else mLabel.textContent = `${T.monthNames[curMonth-1]} ${curYear}`;

  // 요일 헤더
  const dh = document.getElementById("daysHeader");
  dh.innerHTML = T.days.map((d, i) =>
    `<div class="cal-dlabel"${i>=5?' style="color:var(--warm-mid)"':''}>${d}</div>`
  ).join("");

  // 날짜 그리드
  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const firstDay = new Date(curYear, curMonth-1, 1).getDay();
  const offset = firstDay === 0 ? 6 : firstDay - 1;
  const daysInMonth = new Date(curYear, curMonth, 0).getDate();
  const prevMonthDays = new Date(curYear, curMonth-1, 0).getDate();

  // 이전 달 날짜 (흐리게)
  for (let i = 0; i < offset; i++) {
    const d = document.createElement("div");
    d.className = "cal-day other-month";
    d.textContent = prevMonthDays - offset + 1 + i;
    grid.appendChild(d);
  }

  // 이번 달 날짜
  for (let d = 1; d <= daysInMonth; d++) {
    const key = dk(curYear, curMonth, d);
    const div = document.createElement("div");
    div.className = "cal-day";
    div.textContent = d;
    if (key === todayKey) div.classList.add("today");
    if (key === selectedDate) div.classList.add("selected");
    if (EVENTS[key] && EVENTS[key].length) {
      div.classList.add("has-event");
      const dot = document.createElement("span");
      dot.className = "dot";
      div.appendChild(dot);
    }
    div.addEventListener("click", () => selectDate(key));
    grid.appendChild(div);
  }

  // 다음 달 날짜 (흐리게)
  const total = offset + daysInMonth;
  const remaining = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let i = 1; i <= remaining; i++) {
    const d = document.createElement("div");
    d.className = "cal-day other-month";
    d.textContent = i;
    grid.appendChild(d);
  }
}

function prevMonth() {
  curMonth--;
  if (curMonth < 1) { curMonth = 12; curYear--; }
  selectedDate = null;
  renderCal();
  document.getElementById("schedSection").innerHTML = "";
}
function nextMonth() {
  curMonth++;
  if (curMonth > 12) { curMonth = 1; curYear++; }
  selectedDate = null;
  renderCal();
  document.getElementById("schedSection").innerHTML = "";
}

// =====================================================
// 날짜 선택 & 스케쥴 표시
// =====================================================
function selectDate(key) {
  selectedDate = key;
  renderCal();
  renderSched(key);
}

function fmtDate(s) {
  const [y, m, d] = s.split("-").map(Number);
  const T = t();
  const dt = new Date(y, m-1, d);
  if (lang === "ko") {
    const dw = ["일","월","화","수","목","금","토"][dt.getDay()];
    return `${m}.${pad(d)} (${dw})`;
  } else if (lang === "en") {
    const dw = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()];
    return `${T.mons[m-1]} ${d}, ${y} (${dw})`;
  } else {
    const dw = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()];
    return `${d}/${m}/${y} (${dw})`;
  }
}

function renderSched(key) {
  const T = t();
  const sec = document.getElementById("schedSection");
  const evs = EVENTS[key];
  let h = `<div class="section-label">${T.todaySched}</div>
            <div class="sched-date-head">${fmtDate(key)}</div>`;
  if (!evs || !evs.length) {
    h += `<div class="no-event">${T.noEvent}</div>`;
  } else {
    evs.forEach(ev => {
      h += `<div class="event-card">
        <div class="event-type">${ev.type}</div>
        <div class="event-title">${ev.title}</div>
        <div class="event-meta">
          <div class="event-meta-row"><i class="ti ti-clock meta-icon"></i><span>${ev.time}</span></div>
          <div class="event-meta-row"><i class="ti ti-map-pin meta-icon"></i><span>${ev.venue}</span></div>
          <div class="event-meta-row"><i class="ti ti-users meta-icon"></i><span>${ev.with}</span></div>
        </div>
      </div>`;
    });
  }
  sec.innerHTML = h;
}

// =====================================================
// 다가오는 공연 목록
// =====================================================
function renderUpcoming() {
  const T = t();
  document.getElementById("upcomingLabel").textContent = T.upcoming;
  const now = new Date(); now.setHours(0,0,0,0);
  const list = Object.entries(EVENTS)
    .filter(([k]) => new Date(k) >= now)
    .sort(([a],[b]) => new Date(a) - new Date(b))
    .slice(0, 6);

  const ul = document.getElementById("upcomingList");
  if (!list.length) {
    ul.innerHTML = `<div class="no-event">${T.noEvent}</div>`;
    return;
  }
  ul.innerHTML = list.map(([k, evs]) => {
    const [y, m, d] = k.split("-").map(Number);
    const ev = evs[0];
    return `<div class="upcoming-item" onclick="goToDate('${k}')">
      <div class="upcoming-date-badge">
        <div class="badge-day">${d}</div>
        <div class="badge-mon">${T.mons[m-1]}</div>
      </div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.title}</div>
        <div class="upcoming-sub">${ev.time} · ${ev.venue.split(" ").slice(0,3).join(" ")}</div>
      </div>
      <i class="ti ti-chevron-right" style="font-size:13px;color:var(--line2)"></i>
    </div>`;
  }).join("");
}

function goToDate(key) {
  const [y, m] = key.split("-").map(Number);
  curYear = y; curMonth = m;
  selectDate(key);
  document.getElementById("app").scrollIntoView({ behavior: "smooth" });
}

// =====================================================

// =====================================================
async function handlePhotoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async (ev) => {
    const dataUrl = ev.target.result;
    const finalUrl = await saveBannerData(dataUrl);
    const img = document.getElementById("bannerImg");
    img.src = finalUrl;
    img.style.opacity = "1";
    renderAdminPanel();
  };
  reader.readAsDataURL(file);
  e.target.value = "";
}

function removeBanner() {
  saveLocalStr(BANNER_KEY, "");
  const img = document.getElementById("bannerImg");
  img.src = "";
  img.style.opacity = "0";
  renderAdminPanel();
}

async function saveNewEvent() {
  const T = t();
  const date  = document.getElementById("ev-date").value;
  const title = document.getElementById("ev-title").value.trim();
  const time  = document.getElementById("ev-time").value.trim();
  const venue = document.getElementById("ev-venue").value.trim();
  const with_ = document.getElementById("ev-with").value.trim();
  const type  = document.getElementById("ev-type").value;
  if (!date || !title || !time || !venue) {
    document.getElementById("evErr").textContent = T.required; return;
  }
  const btn = document.getElementById("evSaveBtn");
  btn.textContent = T.saving; btn.disabled = true;
  if (!EVENTS[date]) EVENTS[date] = [];
  EVENTS[date].push({ type, title, time, venue, with: with_ || "솔로" });
  await saveEvents(EVENTS);
  btn.textContent = T.saved;
  setTimeout(() => {
    closeModal("eventModal");
    renderCal(); renderUpcoming();
    if (selectedDate) renderSched(selectedDate);
    adminTab = "sched";
    openAdminPanel();
  }, 600);
}

    <input class="modal-input" id="ev-title" value="${ev.title}">
    <div class="modal-label">${T.fieldTime}</div>
    <input class="modal-input" id="ev-time" value="${ev.time}">
    <div class="modal-label">${T.fieldVenue}</div>
    <input class="modal-input" id="ev-venue" value="${ev.venue}">
    <div class="modal-label">${T.fieldWith}</div>
    <input class="modal-input" id="ev-with" value="${ev.with}">
    <div class="err-msg" id="evErr"></div>
    <div class="modal-row" style="margin-top:14px">
      <button class="btn-cancel" onclick="closeModal('eventModal');openAdminPanel()">${T.cancel}</button>
      <button class="btn-confirm" id="evSaveBtn" onclick="saveEditEvent('${date}',${idx})">${T.save}</button>
    </div>`;
  document.getElementById("eventModal").classList.add("open");
}

async function saveEditEvent(oldDate, idx) {
  const T = t();
  const date  = document.getElementById("ev-date").value;
  const title = document.getElementById("ev-title").value.trim();
  const time  = document.getElementById("ev-time").value.trim();
  const venue = document.getElementById("ev-venue").value.trim();
  const with_ = document.getElementById("ev-with").value.trim();
  const type  = document.getElementById("ev-type").value;
  if (!date || !title || !time || !venue) {
    document.getElementById("evErr").textContent = T.required; return;
  }
  const btn = document.getElementById("evSaveBtn");
  btn.textContent = T.saving; btn.disabled = true;
  EVENTS[oldDate].splice(idx, 1);
  if (!EVENTS[oldDate].length) delete EVENTS[oldDate];
  if (!EVENTS[date]) EVENTS[date] = [];
  EVENTS[date].push({ type, title, time, venue, with: with_ || "솔로" });
  await saveEvents(EVENTS);
  btn.textContent = T.saved;
  setTimeout(() => {
    closeModal("eventModal");
    renderCal(); renderUpcoming();
    if (selectedDate) renderSched(selectedDate);
    adminTab = "sched";
    openAdminPanel();
  }, 600);
}

// =====================================================
// 공연 삭제
// =====================================================
async function deleteEvent(date, idx) {
  EVENTS[date].splice(idx, 1);
  if (!EVENTS[date].length) delete EVENTS[date];
  await saveEvents(EVENTS);
  renderCal(); renderUpcoming();
  if (selectedDate) renderSched(selectedDate);
  renderAdminPanel();
}

// =====================================================
// 로그아웃
// =====================================================
function doLogout() {
  isAdmin = false;
  closeModal("adminModal");
  document.getElementById("adminBtn").innerHTML = `<i class="ti ti-lock"></i>`;
}

// =====================================================
// 모달 닫기
// =====================================================
function closeModal(id) {
  document.getElementById(id).classList.remove("open");
}

// 모달 배경 클릭하면 닫기
document.querySelectorAll(".modal-wrap").forEach(w => {
  w.addEventListener("click", e => {
    if (e.target === w) w.classList.remove("open");
  });
});

// =====================================================
// 앱 시작!
// =====================================================
initBanner();
setLang(lang);
document.querySelectorAll(".lang-btn").forEach((b, i) => {
  b.classList.toggle("active", ["ko","en","pt"][i] === lang);
});

</script>
</body>
