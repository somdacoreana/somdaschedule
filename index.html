  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCQI626V_wzE1uWQHyy8j44cHgsHptect4",
      authDomain: "somdacoreana.firebaseapp.com",
      projectId: "somdacoreana",
      storageBucket: "somdacoreana.firebasestorage.app",
      messagingSenderId: "799152444366",
      appId: "1:799152444366:web:c3f9dc0572dc5ee96c519f",
      measurementId: "G-YXL9411L1Z"
    };

    let db = null;
    let firebaseReady = false;

    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      firebaseReady = true;
      console.log("✅ Firebase 연결 성공!");
    } catch(e) {
      console.log("⚠️ Firebase 연결 실패", e);
    }

    async function fbLoad(docName) {
      if (!db) return null;
      try {
        const snap = await getDoc(doc(db, "somda", docName));
        return snap.exists() ? snap.data() : null;
      } catch(e) { return null; }
    }

    async function fbSave(docName, data) {
      if (!db) return;
      try { await setDoc(doc(db, "somda", docName), data); }
      catch(e) { console.log("저장 실패:", e); }
    }

    window._fb = { fbLoad, fbSave, firebaseReady };
    window.dispatchEvent(new Event("firebase-ready"));
  </script>

    .nav-btn:hover { background: var(--warm-light); color: var(--warm); }
    .cal-days-header { display: grid; grid-template-columns: repeat(7, 1fr); margin-bottom: 4px; }
    .cal-dlabel { text-align: center; font-size: 10px; font-weight: 500; color: var(--ink3); padding: 4px 0; }
    .cal-days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; }
    .cal-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; border-radius: 50%; position: relative; transition: all 0.12s; font-size: 13px; color: var(--ink); }
    .cal-day:hover:not(.other-month) { background: var(--warm-light); }

const DEFAULT_FORM_TAGS    = [{ name:"솔로", emoji:"" }, { name:"듀오", emoji:"" }, { name:"트리오", emoji:"" }, { name:"밴드", emoji:"" }];

let EVENTS    = loadLocal(KEYS.events, DEFAULT_EVENTS);
let TEAM_TAGS = loadLocal(KEYS.teamTags, DEFAULT_TEAM_TAGS);

let selectedDate = null;

const today    = new Date();
const todayKey = `${today.getFullYear()}-${pad(today.getMonth()+1)}-${pad(today.getDate())}`;

function loadLocal(key, fallback) {
  try { const s=localStorage.getItem(key); return s?JSON.parse(s):JSON.parse(JSON.stringify(fallback)); }
  catch(e) { return JSON.parse(JSON.stringify(fallback)); }
}
function loadLocalStr(key, fb) { try { return localStorage.getItem(key)||fb; } catch(e) { return fb; } }
function saveLocal(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {} }
function saveLocalStr(key, val) { try { localStorage.setItem(key, val); } catch(e) {} }
function pad(n) { return String(n).padStart(2,"0"); }
function t() { return I18N[lang]; }
function dk(y,m,d) { return `${y}-${pad(m)}-${pad(d)}`; }

// 태그 이름으로 이모지 찾기
function getEmojiForTag(tagName) {
  const found = TEAM_TAGS.find(tg => tg.name === tagName);
  return found?.emoji || "";
}

// 날짜의 이모지 목록 (팀태그 기준)
function getEmojisForDate(key) {
  const evs = EVENTS[key];
  if (!evs?.length) return [];
  const emojis = [];
  evs.forEach(ev => {
    (ev.teamTags||[]).forEach(tagName => {
      const emoji = getEmojiForTag(tagName);
      if (emoji && !emojis.includes(emoji)) emojis.push(emoji);
    });
  });
  return emojis;
}

window.addEventListener("firebase-ready", async () => {
  if (!window._fb?.firebaseReady) return;
  const { fbLoad } = window._fb;

  const evData = await fbLoad("events");
  if (evData?.list) { EVENTS = evData.list; saveLocal(KEYS.events, EVENTS); }

  const tagsData = await fbLoad("tags");
  if (tagsData) {
    if (tagsData.teamTags) { TEAM_TAGS = tagsData.teamTags; saveLocal(KEYS.teamTags, TEAM_TAGS); }
    if (tagsData.formationTags) { FORM_TAGS = tagsData.formationTags; saveLocal(KEYS.formationTags, FORM_TAGS); }
  }

  const bannerData = await fbLoad("banner");
  if (bannerData?.url) {
    const img = document.getElementById("bannerImg");
    img.src = bannerData.url; img.style.display = "block";
  }

  renderCal(); renderUpcoming();
  if (selectedDate) renderSched(selectedDate);
});

async function fbSaveAll() {
  if (!window._fb?.firebaseReady) return;
  const { fbSave } = window._fb;
  await fbSave("events", { list: EVENTS });
  await fbSave("tags", { teamTags: TEAM_TAGS, formationTags: FORM_TAGS });
}

function renderCal() {
  const T = t();
  const ml = document.getElementById("calMonthLabel");
  ml.textContent = lang==="ko" ? `${curYear}. ${pad(curMonth)}` : `${T.monthNames[curMonth-1]} ${curYear}`;

  document.getElementById("daysHeader").innerHTML = T.days.map((d,i) =>
    `<div class="cal-dlabel"${i>=5?' style="color:var(--warm-mid)"':''}>${d}</div>`
  ).join("");

  const grid = document.getElementById("calGrid");
  grid.innerHTML = "";
  const fd  = new Date(curYear,curMonth-1,1).getDay();
  const off = fd===0?6:fd-1;
  const dim = new Date(curYear,curMonth,0).getDate();
  const pmd = new Date(curYear,curMonth-1,0).getDate();

  for (let i=0;i<off;i++) {
    const d=document.createElement("div"); d.className="cal-day other-month"; d.textContent=pmd-off+1+i; grid.appendChild(d);
  }
  for (let d=1;d<=dim;d++) {
    const key = dk(curYear,curMonth,d);
    const div = document.createElement("div");
    div.className = "cal-day"; div.textContent = d;
    if (key===todayKey) div.classList.add("today");
    if (key===selectedDate) div.classList.add("selected");

    if (EVENTS[key]?.length) {
      div.classList.add("has-event");
      const emojis = getEmojisForDate(key);
      if (emojis.length > 0) {
        // 이모지 표시
        const emojiRow = document.createElement("div");
        emojiRow.className = "emoji-row";
        emojiRow.textContent = emojis.join("");
        div.appendChild(emojiRow);
      } else {
        // 이모지 없으면 점
        div.classList.add("no-emoji");
        const dot = document.createElement("span");
        dot.className = "dot"; div.appendChild(dot);
      }
    }
    div.addEventListener("click", ()=>selectDate(key));
    grid.appendChild(div);
  }
  const rem = (off+dim)%7===0?0:7-(off+dim)%7;
  for (let i=1;i<=rem;i++) {
    const d=document.createElement("div"); d.className="cal-day other-month"; d.textContent=i; grid.appendChild(d);
  }
}

function prevMonth() { curMonth--; if(curMonth<1){curMonth=12;curYear--;} selectedDate=null; renderCal(); document.getElementById("schedSection").innerHTML=""; }
function nextMonth() { curMonth++; if(curMonth>12){curMonth=1;curYear++;} selectedDate=null; renderCal(); document.getElementById("schedSection").innerHTML=""; }
function selectDate(key) { selectedDate=key; renderCal(); renderSched(key); }

function fmtDate(s) {
  const [y,m,d]=s.split("-").map(Number); const T=t(); const dt=new Date(y,m-1,d);
  if(lang==="ko"){const dw=["일","월","화","수","목","금","토"][dt.getDay()]; return `${m}.${pad(d)} (${dw})`;}
  else if(lang==="en"){const dw=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][dt.getDay()]; return `${T.mons[m-1]} ${d}, ${y} (${dw})`;}
  else{const dw=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()]; return `${d}/${m}/${y} (${dw})`;}
}

function renderSched(key) {
  const T = t(); const sec = document.getElementById("schedSection");
  const evs = EVENTS[key];
  let h = `<div class="section-label">${T.todaySched}</div><div class="sched-date-head">${fmtDate(key)}</div>`;
  if (!evs?.length) { h+=`<div class="no-event">${T.noEvent}</div>`; sec.innerHTML=h; return; }
  evs.forEach(ev => {
    const teamTagsHtml = (ev.teamTags||[]).map(tag => {
      const emoji = getEmojiForTag(tag);
      return `<span class="tag tag-team">${emoji?emoji+' ':''}${tag}</span>`;
    }).join("");
    const formTagsHtml = (ev.formationTags||[]).map(tag=>`<span class="tag tag-formation">${tag}</span>`).join("");
    const tagsHtml = (teamTagsHtml||formTagsHtml)?`<div class="event-tags">${teamTagsHtml}${formTagsHtml}</div>`:"";
    const commentHtml = ev.comment?`<div class="event-comment">${ev.comment}</div>`:"";
    const linkHtml = ev.link?`<div class="event-meta-row"><i class="ti ti-link meta-icon"></i><a class="event-link" href="${ev.link}" target="_blank" rel="noopener">${T.linkLabel}</a></div>`:"";
    h += `<div class="event-card">
      <div class="event-type">${ev.type}</div>
      <div class="event-title">${ev.title}</div>
      ${tagsHtml}${commentHtml}
      <div class="event-meta">
        <div class="event-meta-row"><i class="ti ti-clock meta-icon"></i><span>${ev.time}</span></div>
        <div class="event-meta-row"><i class="ti ti-map-pin meta-icon"></i><span>${ev.venue}</span></div>
        <div class="event-meta-row"><i class="ti ti-users meta-icon"></i><span>${ev.with}</span></div>
        ${linkHtml}
      </div>
    </div>`;
  });
  sec.innerHTML = h;
}

function renderUpcoming() {
  const T = t();
  document.getElementById("upcomingLabel").textContent = T.upcoming;
  const now = new Date(); now.setHours(0,0,0,0);
  const list = Object.entries(EVENTS).filter(([k])=>new Date(k)>=now).sort(([a],[b])=>new Date(a)-new Date(b)).slice(0,6);
  const ul = document.getElementById("upcomingList");
  if (!list.length) { ul.innerHTML=`<div class="no-event">${T.noEvent}</div>`; return; }
  ul.innerHTML = list.map(([k,evs]) => {
    const [y,m,d]=k.split("-").map(Number); const ev=evs[0];
    const teamTagsHtml = (ev.teamTags||[]).map(tag => {
      const emoji = getEmojiForTag(tag);
      return `<span class="upcoming-tag tag-team">${emoji?emoji+' ':''}${tag}</span>`;
    }).join("");
    const formTagsHtml = (ev.formationTags||[]).map(tag=>`<span class="upcoming-tag tag-formation">${tag}</span>`).join("");
    return `<div class="upcoming-item" onclick="goToDate('${k}')">
      <div class="upcoming-date-badge"><div class="badge-day">${d}</div><div class="badge-mon">${T.mons[m-1]}</div></div>
      <div class="upcoming-info">
        <div class="upcoming-title">${ev.title}</div>
        <div class="upcoming-sub">${ev.time} · ${ev.venue.split(" ").slice(0,3).join(" ")}</div>
        ${(teamTagsHtml||formTagsHtml)?`<div class="upcoming-tags">${teamTagsHtml}${formTagsHtml}</div>`:""}
      </div>
      <i class="ti ti-chevron-right" style="font-size:13px;color:var(--line2)"></i>
    </div>`;
  }).join("");
}

function goToDate(key) {
  const [y,m]=key.split("-").map(Number); curYear=y; curMonth=m;
  selectDate(key);
  setTimeout(()=>{
    const sec=document.getElementById("schedSection");
    if(sec) sec.scrollIntoView({behavior:"smooth", block:"start"});
  }, 80);
}

async function addTag(type) {
  const isTeam = type==="team";
  const nameEl = document.getElementById(isTeam?"newTeamTagName":"newFormTagName");
  const emojiEl = document.getElementById(isTeam?"newTeamTagEmoji":"newFormTagEmoji");
  const name = nameEl?.value.trim();
  if (!name) return;
  const emoji = emojiEl?.value.trim() || "";
  const arr = isTeam ? TEAM_TAGS : FORM_TAGS;
  const key = isTeam ? KEYS.teamTags : KEYS.formationTags;
  if (!arr.find(tg=>tg.name===name)) arr.push({ name, emoji });
  saveLocal(key, arr);
  await fbSaveAll();
  renderAdminPanel();
}

async function deleteTag(type, idx) {
  const isTeam = type==="team";
  const arr = isTeam ? TEAM_TAGS : FORM_TAGS;
  const key = isTeam ? KEYS.teamTags : KEYS.formationTags;
  arr.splice(idx,1); saveLocal(key, arr);
  await fbSaveAll();
  renderAdminPanel();
}

async function saveNewEvent() {
  const T=t();
  const date=document.getElementById("ev-date").value;
  const title=document.getElementById("ev-title").value.trim();
  const time=document.getElementById("ev-time").value.trim();
  const venue=document.getElementById("ev-venue").value.trim();
  if (!date||!title||!time||!venue){document.getElementById("evErr").textContent=T.required;return;}
  const btn=document.getElementById("evSaveBtn"); btn.textContent=T.saving; btn.disabled=true;
  if (!EVENTS[date]) EVENTS[date]=[];
  EVENTS[date].push({
    type:document.getElementById("ev-type").value, title, time, venue,
    with:document.getElementById("ev-with").value.trim()||"솔로",
    link:document.getElementById("ev-link").value.trim(),
    comment:document.getElementById("ev-comment").value.trim(),
    teamTags:getSelectedTags("tt",TEAM_TAGS),
    formationTags:getSelectedTags("ft",FORM_TAGS),
  });
  saveLocal(KEYS.events,EVENTS); await fbSaveAll();
  btn.textContent=T.saved;
  setTimeout(()=>{closeModal("eventModal");renderCal();renderUpcoming();if(selectedDate)renderSched(selectedDate);adminTab="sched";openAdminPanel();},600);
}

function openEditEvent(date,idx) {
  const T=t(); const ev=EVENTS[date][idx]; closeModal("adminModal");
  document.getElementById("eventBox").innerHTML=`
    <div class="modal-title">${T.fieldTitle}</div>
    <div class="modal-label">${T.fieldDate}</div><input class="modal-input" type="date" id="ev-date" value="${date}">
    <div class="modal-label">${T.fieldType}</div>
    <select class="modal-input" id="ev-type">${T.typeOptions.map(o=>`<option${ev.type===o?" selected":""}>${o}</option>`).join("")}</select>
    <div class="modal-label">${T.fieldTitle}</div><input class="modal-input" id="ev-title" value="${ev.title}">
    <div class="modal-label">${T.fieldTime}</div><input class="modal-input" id="ev-time" value="${ev.time}">
    <div class="modal-label">${T.fieldVenue}</div><input class="modal-input" id="ev-venue" value="${ev.venue}">
    <div class="modal-label">${T.fieldWith}</div><input class="modal-input" id="ev-with" value="${ev.with||''}">
    <div class="modal-label">${T.fieldLink}</div><input class="modal-input" id="ev-link" value="${ev.link||''}">
    <div class="modal-label">${T.fieldComment}</div><textarea class="modal-input" id="ev-comment">${ev.comment||''}</textarea>
    ${tagCheckboxes(ev.teamTags||[],ev.formationTags||[])}
    <div class="err-msg" id="evErr"></div>
    <div class="modal-row" style="margin-top:14px">
      <button class="btn-cancel" onclick="closeModal('eventModal');openAdminPanel()">${T.cancel}</button>
      <button class="btn-confirm" id="evSaveBtn" onclick="saveEditEvent('${date}',${idx})">${T.save}</button>
    </div>`;
  document.getElementById("eventModal").classList.add("open");
}

async function saveEditEvent(oldDate,idx) {
  const T=t();
  const date=document.getElementById("ev-date").value;
  const title=document.getElementById("ev-title").value.trim();
  const time=document.getElementById("ev-time").value.trim();
  const venue=document.getElementById("ev-venue").value.trim();
  if (!date||!title||!time||!venue){document.getElementById("evErr").textContent=T.required;return;}
  const btn=document.getElementById("evSaveBtn"); btn.textContent=T.saving; btn.disabled=true;
  EVENTS[oldDate].splice(idx,1); if(!EVENTS[oldDate].length) delete EVENTS[oldDate];
  if (!EVENTS[date]) EVENTS[date]=[];
  EVENTS[date].push({
    type:document.getElementById("ev-type").value, title, time, venue,
    with:document.getElementById("ev-with").value.trim()||"솔로",
    link:document.getElementById("ev-link").value.trim(),
    comment:document.getElementById("ev-comment").value.trim(),
    teamTags:getSelectedTags("tt",TEAM_TAGS),
    formationTags:getSelectedTags("ft",FORM_TAGS),
  });
  saveLocal(KEYS.events,EVENTS); await fbSaveAll();
  btn.textContent=T.saved;
  setTimeout(()=>{closeModal("eventModal");renderCal();renderUpcoming();if(selectedDate)renderSched(selectedDate);adminTab="sched";openAdminPanel();},600);
}

async function deleteEvent(date,idx) {
  EVENTS[date].splice(idx,1); if(!EVENTS[date].length) delete EVENTS[date];
  saveLocal(KEYS.events,EVENTS); await fbSaveAll();
  renderCal(); renderUpcoming(); if(selectedDate)renderSched(selectedDate); renderAdminPanel();
}

function handlePhotoUpload(e) {
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{const d=ev.target.result;saveLocalStr(KEYS.banner,d);const img=document.getElementById("bannerImg");img.src=d;img.style.display="block";renderAdminPanel();};
  reader.readAsDataURL(file); e.target.value="";
}
function removeBanner(){saveLocalStr(KEYS.banner,"");const img=document.getElementById("bannerImg");img.src="";img.style.display="none";renderAdminPanel();}
function doLogout(){isAdmin=false;closeModal("adminModal");document.getElementById("adminBtn").innerHTML=`<i class="ti ti-lock"></i>`;}
function closeModal(id){document.getElementById(id).classList.remove("open");}

document.querySelectorAll(".modal-wrap").forEach(w=>{
  w.addEventListener("click",e=>{if(e.target===w)w.classList.remove("open");});
});

// 시작
const savedBanner=loadLocalStr(KEYS.banner,"");
if(savedBanner){const img=document.getElementById("bannerImg");img.src=savedBanner;img.style.display="block";}
setLang(lang);
document.querySelectorAll(".lang-btn").forEach((b,i)=>b.classList.toggle("active",["ko","en","pt"][i]===lang));
</script>
